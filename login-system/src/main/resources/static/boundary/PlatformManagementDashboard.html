<!DOCTYPE html>
<html>
<head>
    <title>Platform Management Dashboard</title>
</head>
<body>

<h1>Platform Management Dashboard</h1>

<p id="welcomeMsg"></p>

<hr>

<h3>Functions</h3>

<button onclick="goToViewFSACategory()">View FSA Categories</button><br><br>
<button onclick="goToCreateFSACategory()">Create FSA Category</button><br><br>
<button onclick="goToUpdateFSACategory()">Update FSA Category</button><br><br>
<button onclick="goToDeleteFSACategory()">Delete FSA Category</button><br><br>
<button onclick="goToSearchFSACategory()">Search FSA Category</button><br><br>
<button onclick="goToGenerateReport()">Generate Daily Report</button>
<br><br>
<br><br>

<button onclick="goToLogoutPage()">Logout</button>

<script>
// Check if user is logged in
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "LoginPage.html";
}

// Show username
const username = localStorage.getItem("username");
document.getElementById("welcomeMsg").innerText =
    "Welcome, " + username;

// Go to create FSA category page
function goToCreateFSACategory() {
    window.location.href = "CreateFSACategoryPage.html";
}

// Go to view FSA category page
function goToViewFSACategory() {
    window.location.href = "ViewFSACategoryPage.html";
}

// Go to update FSA category page
function goToUpdateFSACategory() {
    window.location.href = "UpdateFSACategoryPage.html";
}

// Go to delete FSA category page
function goToDeleteFSACategory() {
    window.location.href = "DeleteFSACategoryPage.html";
}

// Go to search FSA category page
function goToSearchFSACategory() {
    window.location.href = "SearchFSACategoryPage.html";
}

// Go to generate report page
function goToGenerateReport() {
    window.location.href = "GenerateReportPage.html";
}

// Go to logout page
function goToLogoutPage() {
    window.location.href = "LogoutPage.html";
}

</script>

</body>
</html>
