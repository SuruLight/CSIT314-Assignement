<!DOCTYPE html>
<html>
<head>
    <title>Platform Management Dashboard</title>
</head>
<body>

<h1>Platform Management Dashboard</h1>

<p id="welcomeMsg"></p>

<hr>

<h3>Functions</h3>

<button onclick="goToCreateFSACat()">Create FSA Category</button>
<br><br>
<br><br>

<button onclick="goToLogoutPage()">Logout</button>

<script>
// Check if user is logged in
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "LoginPage.html";
}

// Show username
const username = localStorage.getItem("username");
document.getElementById("welcomeMsg").innerText =
    "Welcome, " + username;

// Go to create FSA category page
function goToCreateFSACat() {
    window.location.href = "CreateFSACatPage.html";
}

// Go to logout page
function goToLogoutPage() {
    window.location.href = "LogoutPage.html";
}

</script>

</body>
</html>
