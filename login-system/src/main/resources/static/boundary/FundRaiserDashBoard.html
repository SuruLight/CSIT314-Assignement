<!DOCTYPE html>
<html>
<head>
    <title>Fund Raiser Dashboard</title>
</head>
<body>

<h1>Fund Raiser Dashboard</h1>

<p id="welcomeMsg"></p>

<hr>

<h3>Functions</h3>

<button onclick="goToCreateActivity()">Create Fund Raising Activity</button><br><br>
<button onclick="goToViewActivity()">View Fund Raising Activity</button><br><br>
<button onclick="goToUpdateActivity()">Update Fundraising Activity</button><br><br>
<button onclick="goToDeleteActivity()">Delete Fundraising Activity</button><br><br>
<button onclick="goToSearchActivity()">Search Fund Raising Activity</button><br><br>
<button onclick="goToViewFRAList()">All FRA</button> <br><br>
<button onclick="goToViewFRA()">View Specific FRA</button>
<br><br>
<br><br>

<button onclick="goToLogoutPage()">Logout</button>

<script>
// Check if user is logged in
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "LoginPage.html";
}

// Show username
const username = localStorage.getItem("username");
document.getElementById("welcomeMsg").innerText =
    "Welcome, " + username;

// Go to create activity page
function goToCreateActivity() {
    window.location.href = "CreateActivityPage.html";
}

// Go to view activity page
function goToViewActivity() {
    window.location.href = "ViewActivityPage.html";
}

// Go to update activity page
function goToUpdateActivity() {
    window.location.href = "UpdateActivityPage.html";
}

// Go to delete activity page
function goToDeleteActivity() {
    window.location.href = "DeleteActivityPage.html";
}

// Go to search activity page
function goToSearchActivity() {
    window.location.href = "SearchActivityPage.html";
}

// Go to view FRA List page
function goToViewFRAList() {
    window.location.href = "ViewFRAListPage.html";
}

// Go to view specific FRA page
function goToViewFRA() {
    window.location.href = "ViewFRAPage.html";
}

// Go to logout page
function goToLogoutPage() {
    window.location.href = "LogoutPage.html";
}

</script>

</body>
</html>
