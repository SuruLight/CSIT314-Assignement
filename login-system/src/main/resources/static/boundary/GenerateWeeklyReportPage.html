<!DOCTYPE html>
<html>
<head>
    <title>Generate Weekly Report</title>
</head>
<body>

<h2>Generate Weekly Report</h2>

<label>Start Date:</label>
<input type="date" id="startDate"><br>

<label>End Date:</label>
<input type="date" id="endDate"><br>

<button onclick="selectDateRange()">Generate Report</button>

<p id="message"></p>

<table border="1" id="reportTable" style="display:none;">
    <tr>
        <th>Start Date</th>
        <td id="start"></td>
    </tr>
    <tr>
        <th>End Date</th>
        <td id="end"></td>
    </tr>
    <tr>
        <th>Total Activities</th>
        <td id="totalActivities"></td>
    </tr>
    <tr>
        <th>Total Target Amount</th>
        <td id="totalTargetAmount"></td>
    </tr>
</table>

<br>
<button onclick="goBack()">Back</button>

<script>
function selectDateRange() {
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    fetch("http://localhost:8080/api/management/reports/weekly", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            startDate: startDate,
            endDate: endDate
        })
    })
    .then(response => response.json())
    .then(weeklyReport => {
        displayReport(weeklyReport);
    });
}

function displayReport(weeklyReport) {
    if (weeklyReport == null) {
        document.getElementById("message").innerText =
            "No activity data found for the selected week. Please try again.";
        document.getElementById("reportTable").style.display = "none";
        return;
    }

    document.getElementById("message").innerText = "";
    document.getElementById("reportTable").style.display = "table";

    document.getElementById("start").innerText = weeklyReport.startDate;
    document.getElementById("end").innerText = weeklyReport.endDate;
    document.getElementById("totalActivities").innerText = weeklyReport.totalActivities;
    document.getElementById("totalTargetAmount").innerText = weeklyReport.totalTargetAmount;
}

function goBack() {
    window.location.href = "PlatformManagementDashboard.html";
}
</script>

</body>
</html>
