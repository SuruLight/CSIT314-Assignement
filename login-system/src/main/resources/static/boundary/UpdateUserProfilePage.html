<!DOCTYPE html>
<html>
<head>
    <title>Update User Profile</title>
</head>
<body>

<h2>Update User Profile</h2>

<input type="text" id="profileName" placeholder="new name">
<br>

<select id="roleType">
    <option value="USER_ADMIN">USER_ADMIN</option>
    <option value="FR">FR</option>
    <option value="DONEE">DONEE</option>
    <option value="PLATFORM_MANAGEMENT">PLATFORM_MANAGEMENT</option>
</select>

<p><b>Select Permissions:</b></p>

<label><input type="checkbox" value="SEARCH_USER"> Search User</label><br>
<label><input type="checkbox" value="VIEW_USER"> View User</label><br>
<label><input type="checkbox" value="SUSPEND_USER"> Suspend User</label><br>
<label><input type="checkbox" value="UPDATE_USER"> Update User</label><br>

<button onclick="editProfile()">Update Profile</button>

<p id="result"></p>

<button onclick="goBack()">Back</button>

<script>
function editProfile() {
    // FIX: Use getElementById(...).value to get the actual text typed
    const profileName = document.getElementById("profileName").value;
    const roleType = document.getElementById("roleType").value;
    const selectedPermissions = document.querySelectorAll('input[type="checkbox"]:checked');

    let permissions = [];
    selectedPermissions.forEach(p => {
        permissions.push(p.value);
    });
    permissions = permissions.join(",");

    fetch("http://localhost:8080/api/admin/profiles/update", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        roleType: roleType,
        profileName: profileName, 
        permissions: permissions
    })
})
    .then(response => response.json())
    .then(data => {
        displayMessage(data);
    })
    .catch(err => console.error("Error:", err));
}

function displayMessage(userProfile) {
    // FIX: Check if the returned object is valid
    if (!userProfile || !userProfile.role) {
        document.getElementById("result").innerText = "Error updating profile.";
        return;
    }

    // FIX: Use the correct field names from your UserProfile entity
    document.getElementById("result").innerText =
        "Updated Role: " + userProfile.role + 
        " | New Name: " + userProfile.profileName + 
        " | Permissions: " + userProfile.permissions;
}
function goBack() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
