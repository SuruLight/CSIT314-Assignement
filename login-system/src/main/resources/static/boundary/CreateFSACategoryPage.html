<!DOCTYPE html>
<html>
<head>
    <title>Create FSA Category</title>
</head>
<body>

<h2>Create FSA Category</h2>

<input type="text" id="catName" placeholder="Category Name"><br>
<input type="text" id="catDesc" placeholder="Category Description"><br>

<button onclick="enterCatDetails()">Submit</button>

<p id="result"></p>

<button onclick="goBack()">Back</button>

<script>
function enterCatDetails() {
    const catName = document.getElementById("catName").value;
    const catDesc = document.getElementById("catDesc").value;

    fetch("http://localhost:8080/api/management/fsa-category/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            catName: catName,
            catDesc: catDesc
        })
    })
    .then(response => response.text())
    .then(result => {
        displayMessage(result);
    });
}

function displayMessage(result) {
    document.getElementById("result").innerText = result;
}

function goBack() {
    window.location.href = "PlatformManagementDashboard.html";
}
</script>

</body>
</html>
