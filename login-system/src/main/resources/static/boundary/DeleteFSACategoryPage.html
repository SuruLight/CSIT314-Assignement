<!DOCTYPE html>
<html>
<head>
    <title>Delete FRA Category</title>
</head>
<body>

<h2>Delete FRA Category</h2>

<input type="number" id="categoryID" placeholder="Category ID">
<button onclick="selectCategory()">Delete Category</button>

<p id="result"></p>

<button onclick="goBack()">Back</button>

<script>
function selectCategory() {
    const categoryID = document.getElementById("categoryID").value;

    const confirmed = confirm("Are you sure you want to delete this FSA category?");

    if (!confirmed) {
        displayMessage("Deletion cancelled.");
        return;
    }

    fetch("http://localhost:8080/api/management/fsa-category/delete/" + categoryID, {
        method: "DELETE"
    })
    .then(response => response.text())
    .then(result => {
        displayMessage(result);
    })
    .catch(error => {
        displayMessage("Failed to delete FSA Category. Please check and try again.");
    });
}

function displayMessage(result) {
    document.getElementById("result").innerText = result;
}

function goBack() {
    window.location.href = "PlatformManagementDashboard.html";
}
</script>

</body>
</html>
