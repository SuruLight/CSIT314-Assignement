<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<p id="welcomeMsg"></p>

<hr>

<h3>Functions</h3>

<button onclick="goToSearchUser()">Search User Accounts</button><br><br>
<button onclick="goToSuspendUser()">Suspend User Account</button><br><br>
<button onclick="goToUpdateUser()">Update User Account</button><br><br>
<button onclick="goToViewUser()">View User Account</button><br><br>
<button onclick="goToCreateUser()">Create User Account</button><br><br>
<button onclick="goToSearchUserProfile()">Search User Profile</button>
<br><br>
<br><br>

<button onclick="logout()">Logout</button>

<script>
// Check if user is logged in
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "LoginPage.html";
}

// Show username
const username = localStorage.getItem("username");
document.getElementById("welcomeMsg").innerText =
    "Welcome, " + username;

// Go to search user page
function goToSearchUser() {
    window.location.href = "SearchUserAccountPage.html";
}
// Go to suspend user page
function goToSuspendUser() {
    window.location.href = "SuspendUserAccountPage.html";
}

// Logout
function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");
    window.location.href = "LoginPage.html";
}

// Go to update user page
function goToUpdateUser() {
    window.location.href = "UpdateUserAccountPage.html";
}

// Go to view user page
function goToViewUser() {
    window.location.href = "ViewUserAccountPage.html";
}

// Go to create user page
function goToCreateUser() {
    window.location.href = "CreateUserAccountPage.html";
}

// Go to search user profile page
function goToSearchUserProfile() {
    window.location.href = "SearchUserProfilePage.html";
}

</script>

</body>
</html>
