<!DOCTYPE html>
<html>
<head>
    <title>Donee Dashboard</title>
</head>
<body>

<h1>Donee Dashboard</h1>

<p id="welcomeMsg"></p>

<hr>

<h3>Functions</h3>

<button onclick="goToViewListings()">View Listings</button><br><br>
<button onclick="goToSearchListings()">Search Listings</button><br><br>
<button onclick="goToSaveListings()">Save Listing</button>
<br><br>
<br><br>

<button onclick="goToLogoutPage()">Logout</button>

<script>
// Check if user is logged in
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "LoginPage.html";
}

// Show username
const username = localStorage.getItem("username");
document.getElementById("welcomeMsg").innerText =
    "Welcome, " + username;

// Go to view listings page
function goToViewListings() {
    window.location.href = "ViewListingsPage.html";
}

// Go to search listings page
function goToSearchListings() {
    window.location.href = "SearchListingsPage.html";
}

// Go to save listings page
function goToSaveListings() {
    window.location.href = "SaveListingsPage.html";
}

// Go to logout page
function goToLogoutPage() {
    window.location.href = "LogoutPage.html";
}

</script>

</body>
</html>
