<!DOCTYPE html>
<html>
<head>
    <title>Suspend User Profile</title>
</head>
<body>

<h2>Suspend User Profile</h2>

<input type="text" id="roleName" placeholder="Enter Role Name (e.g. FR)">
<button onclick="suspendRole()">Suspend Role</button>

<p id="result"></p>

<button onclick="goBack()">Back</button>

<script>
function suspendRole() { // 👈 Match this to your button's onclick
    const role = document.getElementById("roleName").value;

    fetch("http://localhost:8080/api/admin/profiles/" + role + "/suspend", {
        method: "PUT"
    })
    .then(response => response.json())
    .then(userProfile => {
        if (userProfile && userProfile.role) {
            document.getElementById("result").innerText = 
                "Role " + userProfile.role + " has been suspended.";
        } else {
            document.getElementById("result").innerText = "Error: Role not found.";
        }
    })
    .catch(error => {
        document.getElementById("result").innerText = "System error.";
    });
}

function displayMessage(userProfile) {
    if (userProfile == null) {
        document.getElementById("result").innerText =
            "Error updating profile. Please try again.";
        return;
    }

    document.getElementById("result").innerText =
        "User profile suspended successfully. Username: " +
        userProfile.username;
}

function goBack() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
