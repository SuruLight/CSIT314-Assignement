<!DOCTYPE html>
<html>
<head>
    <title>View User Profiles</title>
</head>
<body>

<h2>View User Profiles</h2>
<button onclick="requestUserProfiles()">View User Profiles</button>
<p id="message"></p>

<table border="1">
    <thead>
        <tr>
            <th>Profile Name</th>
            <th>Role</th>
            <th>Description</th>
            <th>Permissions</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="userProfiles"></tbody>
</table>

<br>
<button onclick="goBack()">Back</button>

<script>
function requestUserProfiles() {
    fetch("http://localhost:8080/api/admin/user-profiles/all")
    .then(response => {
        if (!response.ok) throw new Error("Failed to fetch");
        return response.json();
    })
    .then(userProfileList => {
        displayUserProfiles(userProfileList);
    })
    .catch(err => {
        document.getElementById("message").innerText = "Error: " + err.message;
    });
}

function displayUserProfiles(userProfileList) {
    const tableBody = document.getElementById("userProfiles");
    const message = document.getElementById("message");

    tableBody.innerHTML = "";

    if (!userProfileList || userProfileList.length === 0) {
        message.innerText = "No user profiles found.";
        return;
    }

    message.innerText = "";

    userProfileList.forEach(profile => {
        // Use 'profile.suspended' (matches Java boolean field)
        const status = profile.suspended ? "SUSPENDED" : "Active";
        
        tableBody.innerHTML += `
            <tr>
                <td>${profile.profileName || "N/A"}</td>
                <td>${profile.role}</td>
                <td>${profile.description || "No description"}</td>
                <td>${profile.permissions}</td>
                <td>${status}</td> 
            </tr>
        `;
    });
}

function goBack() {
    window.location.href = "dashboard.html";
}
</script>
</body>
</html>
